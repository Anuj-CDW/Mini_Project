<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reports – Finova</title>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/subpage.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .report-stat{background:#fff;border:1.5px solid #e5e7eb;border-radius:16px;padding:22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .28s;animation:fadeUp .5s both}
    .report-stat:nth-child(1){animation-delay:.1s}.report-stat:nth-child(2){animation-delay:.2s}.report-stat:nth-child(3){animation-delay:.3s}
    .report-stat:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.08);border-color:#c4b5fd}
    .mini-bar-wrap{margin-top:6px;height:4px;background:#f3f4f6;border-radius:3px;overflow:hidden}
    .mini-bar-fill{height:100%;border-radius:3px;transition:width 1s .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .cat-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f9fafb;transition:background .15s;animation:fadeUp .4s both}
    .cat-row:hover{background:#faf5ff}
    .cat-row:last-child{border-bottom:none}
    .empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
    .empty-state .emoji{font-size:40px;margin-bottom:12px}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-box">F</div><strong>Finova</strong></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Dashboard</a>
      <a class="nav-item" href="#" id="addExpenseNav"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>Add Expense</a>
      <a class="nav-item" href="budget.html"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Set Budget</a>
      <a class="nav-item" href="trips.html"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Trips &amp; Split</a>
      <a class="nav-item active" href="reports.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Reports</a>
      <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-email" id="sidebarEmail"></div>
      <a href="../index.html" class="signout-btn" id="signOutBtn"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px">
      <div><h1 class="page-title">Reports</h1><p class="page-sub">Your spending insights</p></div>
      <div class="filter-bar">
        <select id="monthFilter" class="form-input" style="width:auto;padding:9px 14px;font-size:13px">
          <option value="">All Time</option>
        </select>
        <select id="catFilter" class="form-input" style="width:auto;padding:9px 14px;font-size:13px">
          <option value="">All Categories</option>
          <option>Food & Dining</option><option>Travel</option><option>Shopping</option>
          <option>Health & Fitness</option><option>Entertainment</option>
          <option>Bills & Utilities</option><option>Education</option><option>Other</option>
        </select>
        <button class="btn-purple" id="exportBtn" style="font-size:13px;padding:9px 16px">⬇ Export CSV</button>
      </div>
    </div>

    <div class="stats-grid" id="reportStats" style="margin-bottom:24px"></div>

    <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-bottom:22px">
      <div class="chart-card">
        <h3 class="card-title">Monthly Spending Trend</h3>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3 class="card-title">Category Breakdown</h3>
        <div id="catBreakdown"></div>
      </div>
    </div>

    <div class="txn-card">
      <div class="card-header">
        <h3 class="card-title">All Transactions</h3>
        <span id="txnCount" style="font-size:13px;color:#9ca3af;background:#f9fafb;padding:4px 10px;border-radius:20px"></span>
      </div>
      <div class="txn-table-wrap">
        <table class="txn-table">
          <thead><tr><th>Date</th><th>Category</th><th>Note</th><th>Amount</th><th></th></tr></thead>
          <tbody id="reportTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-top"><h3>Add Expense</h3><button class="modal-close" id="modalClose">✕</button></div>
      <div class="form-group"><label>Amount (₹)</label><input type="number" id="expAmount" class="form-input" placeholder="e.g. 500"/></div>
      <div class="form-group"><label>Note</label><input type="text" id="expNote" class="form-input" placeholder="e.g. Zomato order"/></div>
      <div class="form-group"><label>Category</label>
        <select id="expCategory" class="form-input">
          <option>Food &amp; Dining</option><option>Travel</option><option>Shopping</option>
          <option>Health &amp; Fitness</option><option>Entertainment</option>
          <option>Bills &amp; Utilities</option><option>Education</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="expDate" class="form-input"/></div>
      <div id="expError" class="error-msg" style="display:none"></div>
      <button class="btn-save" id="saveExpense">Add Expense</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/common.js"></script>
  <script>
    const CAT_COLORS={'Travel':'#7c3aed','Health & Fitness':'#06b6d4','Entertainment':'#10b981','Bills & Utilities':'#f59e0b','Other':'#ef4444','Food & Dining':'#f97316','Shopping':'#ec4899','Education':'#3b82f6','Income':'#22c55e'};
    function catColor(c){return CAT_COLORS[c]||'#9ca3af';}
    function fmt(n){return '₹'+parseFloat(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

    let barChartInst=null;

    function populateMonthFilter(){
      const txns=getTxns();
      const months=[...new Set(txns.map(t=>t.date.substring(0,7)))].sort().reverse();
      const sel=document.getElementById('monthFilter');
      months.forEach(m=>{
        const[y,mo]=m.split('-');
        const label=new Date(y,mo-1,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
        sel.innerHTML+=`<option value="${m}">${label}</option>`;
      });
    }

    function getFiltered(){
      let txns=getTxns();
      const mf=document.getElementById('monthFilter').value;
      const cf=document.getElementById('catFilter').value;
      if(mf) txns=txns.filter(t=>t.date.startsWith(mf));
      if(cf) txns=txns.filter(t=>t.category===cf);
      return txns.sort((a,b)=>b.date.localeCompare(a.date));
    }

    function renderReportStats(txns){
      const exp=txns.filter(t=>t.type!=='income');
      const inc=txns.filter(t=>t.type==='income');
      const totalExp=exp.reduce((s,t)=>s+t.amount,0);
      const totalInc=inc.reduce((s,t)=>s+t.amount,0);
      const net=totalInc-totalExp;
      document.getElementById('reportStats').innerHTML=`
        <div class="report-stat"><div class="stat-left"><span class="stat-label">Total Expenses</span><span class="stat-val">${fmt(totalExp)}</span></div><div class="stat-icon" style="background:#faf5ff"><span style="font-size:22px">💸</span></div></div>
        <div class="report-stat"><div class="stat-left"><span class="stat-label">Total Income</span><span class="stat-val" style="color:#16a34a">${fmt(totalInc)}</span></div><div class="stat-icon" style="background:#f0fdf4"><span style="font-size:22px">💰</span></div></div>
        <div class="report-stat"><div class="stat-left"><span class="stat-label">Net Savings</span><span class="stat-val" style="color:${net>=0?'#16a34a':'#dc2626'}">${fmt(net)}</span></div><div class="stat-icon" style="background:#fffbeb"><span style="font-size:22px">🏦</span></div></div>
      `;
    }

    function renderBarChart(txns){
      const monthMap={};
      txns.filter(t=>t.type!=='income').forEach(t=>{const m=t.date.substring(0,7);monthMap[m]=(monthMap[m]||0)+t.amount;});
      const sorted=Object.keys(monthMap).sort();
      const labels=sorted.map(m=>{const[y,mo]=m.split('-');return new Date(y,mo-1,1).toLocaleDateString('en-IN',{month:'short',year:'2-digit'});});
      const data=sorted.map(m=>monthMap[m]);
      const canvas=document.getElementById('barChart');
      if(barChartInst) barChartInst.destroy();
      barChartInst=new Chart(canvas,{
        type:'bar',
        data:{labels,datasets:[{label:'Expenses',data,
          backgroundColor:data.map((_,i)=>`hsla(${260+i*8},70%,60%,.8)`),
          borderRadius:8,borderSkipped:false,hoverBackgroundColor:'#7c3aed'}]},
        options:{responsive:true,maintainAspectRatio:false,
          animation:{duration:1000,easing:'easeInOutQuart'},
          plugins:{
            legend:{display:false},
            tooltip:{backgroundColor:'#1e1b4b',titleColor:'#c4b5fd',bodyColor:'#e9d5ff',padding:12,cornerRadius:10,callbacks:{label:c=>'  ₹'+c.raw.toLocaleString('en-IN')}}
          },
          scales:{
            x:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:12}}},
            y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9ca3af',font:{size:12},callback:v=>'₹'+v.toLocaleString('en-IN')},beginAtZero:true}
          }
        }
      });
    }

    function renderCatBreakdown(txns){
      const exp=txns.filter(t=>t.type!=='income');
      const catMap={};
      exp.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
      const total=Object.values(catMap).reduce((a,b)=>a+b,0)||1;
      const sorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
      document.getElementById('catBreakdown').innerHTML=sorted.length?sorted.map(([cat,amt],i)=>{
        const pct=Math.round(amt/total*100);
        const c=catColor(cat);
        return `<div class="cat-row" style="animation-delay:${i*.06}s">
          <div style="display:flex;align-items:center;gap:10px;flex:1">
            <span style="width:10px;height:10px;border-radius:3px;background:${c};flex-shrink:0"></span>
            <span style="font-size:13px;font-weight:500;color:#374151">${cat}</span>
          </div>
          <div style="flex:1;margin:0 14px">
            <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${pct}%;background:${c}"></div></div>
          </div>
          <div style="text-align:right;min-width:100px">
            <div style="font-size:13px;font-weight:700;color:#111827">${fmt(amt)}</div>
            <div style="font-size:11px;color:#9ca3af">${pct}%</div>
          </div>
        </div>`;
      }).join(''):'<div class="empty-state"><div class="emoji">📊</div><p>No data available</p></div>';
    }

    function renderReportTable(txns){
      const tbody=document.getElementById('reportTableBody');
      const cnt=document.getElementById('txnCount');
      cnt.textContent=txns.length+' transactions';
      if(!txns.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:40px;color:#9ca3af">No transactions found.</td></tr>';return;}
      tbody.innerHTML=txns.map((t,i)=>{
        const color=catColor(t.category);
        const dateStr=new Date(t.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
        return `<tr style="animation:fadeUp .4s ${i*.04}s both">
          <td>${dateStr}</td>
          <td><span class="cat-pill" style="background:${color}18;color:${color}">${t.category}</span></td>
          <td>${t.note}</td>
          <td class="txn-amount" style="color:${t.type==='income'?'#16a34a':'#111827'}">${t.type==='income'?'+':''}${fmt(t.amount)}</td>
          <td><button class="del-btn" data-id="${t.id}">🗑</button></td>
        </tr>`;
      }).join('');
      document.querySelectorAll('.del-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const row=btn.closest('tr');
          row.style.transition='opacity .3s,transform .3s';
          row.style.opacity='0';row.style.transform='translateX(16px)';
          setTimeout(()=>{saveTxns(getTxns().filter(t=>String(t.id)!==String(btn.dataset.id)));renderAll();},280);
        });
      });
    }

    function renderAll(){
      const txns=getFiltered();
      renderReportStats(txns);
      renderBarChart(txns);
      renderCatBreakdown(txns);
      renderReportTable(txns);
    }

    document.getElementById('exportBtn').addEventListener('click',()=>{
      const txns=getTxns();
      if(!txns.length){alert('No transactions to export.');return;}
      const csv=['Date,Category,Note,Type,Amount'].concat(txns.map(t=>`${t.date},${t.category},"${t.note}",${t.type},${t.amount}`)).join('\n');
      const a=document.createElement('a');
      a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
      a.download='finova_transactions.csv';a.click();
    });

    populateMonthFilter();
    renderAll();
    document.getElementById('monthFilter').addEventListener('change',renderAll);
    document.getElementById('catFilter').addEventListener('change',renderAll);
  </script>
</body>
</html>
