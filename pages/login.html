<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login – Finova</title>
  <link rel="stylesheet" href="../css/auth.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-topbar">
      <a href="../index.html" class="back-btn">← Back</a>
      <a href="../index.html" class="auth-logo">
        <div class="logo-box">F</div>
        <strong>Finova</strong>
      </a>
    </div>

    <div class="auth-center">
      <div class="auth-heading">
        <h1>Welcome back</h1>
        <p>Sign in to your Finova account</p>
      </div>

      <div class="auth-card">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            <input type="email" id="loginEmail" placeholder="you@example.com"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="••••••••" class="has-toggle"/>
            <button class="eye-btn" id="togglePwd" type="button">
              <svg viewBox="0 0 24 24" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="error-msg" style="display:none"></div>
        <button class="btn-submit" id="loginBtn">Sign In</button>
        <div class="divider"><span>or</span></div>
        <button class="btn-demo" id="demoBtn">▷ &nbsp;Try Demo Account</button>
        <div class="auth-link">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
      </div>
      <p class="auth-terms">By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;
      const err   = document.getElementById('loginError');
      if (!email || !pass) { err.textContent = 'Please fill all fields.'; err.style.display='block'; return; }
      const users = JSON.parse(localStorage.getItem('fv_users') || '{}');
      if (users[email] && users[email].password === pass) {
        localStorage.setItem('fv_current_user', JSON.stringify(users[email]));
        window.location.href = 'dashboard.html';
      } else {
        err.textContent = 'Invalid email or password.';
        err.style.display = 'block';
      }
    });
    document.getElementById('demoBtn').addEventListener('click', () => {
      const demo = { name:'Demo User', email:'demo@finova.app', budget: 50000 };
      localStorage.setItem('fv_current_user', JSON.stringify(demo));
      if (!localStorage.getItem('fv_demo_seeded')) {
        seedDemoData();
        localStorage.setItem('fv_demo_seeded','1');
      }
      window.location.href = 'dashboard.html';
    });
    document.getElementById('togglePwd').addEventListener('click', () => {
      const inp = document.getElementById('loginPassword');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    function seedDemoData() {
      const cats = ['Travel','Health & Fitness','Entertainment','Bills & Utilities','Other','Education','Food & Dining','Shopping'];
      const notes = ['Flight ticket','Medicines','Netflix subscription','Electricity bill','Gaming','Stationery','Water bill','Zomato order','Uber ride','Amazon order','WiFi bill','Gym membership'];
      const txns = [];
      const now = new Date('2026-04-04');
      for (let i=0;i<30;i++) {
        const d = new Date(now); d.setDate(d.getDate()-i);
        txns.push({
          id: Date.now()+i, type:'expense',
          note: notes[i%notes.length],
          category: cats[i%cats.length],
          amount: Math.floor(Math.random()*4900+100),
          date: d.toISOString().split('T')[0]
        });
      }
      txns.push({id:Date.now()+99,type:'income',note:'Salary',category:'Income',amount:75000,date:'2026-04-01'});
      localStorage.setItem('fv_txns_demo@finova.app', JSON.stringify(txns));
      localStorage.setItem('fv_budget_demo@finova.app', '50000');
    }
  </script>
</body>
</html>
