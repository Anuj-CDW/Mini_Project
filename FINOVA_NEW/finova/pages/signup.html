<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up – Finova</title>
  <link rel="stylesheet" href="../css/auth.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-topbar">
      <a href="../index.html" class="back-btn">← Back</a>
      <a href="../index.html" class="auth-logo">
        <div class="logo-box">F</div>
        <strong>Finova</strong>
      </a>
    </div>

    <div class="auth-center">
      <div class="auth-heading">
        <h1>Create account</h1>
        <p>Start tracking your expenses for free</p>
      </div>

      <div class="auth-card">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="signupName" placeholder="Your name"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            <input type="email" id="signupEmail" placeholder="you@example.com"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupPassword" placeholder="Min 6 characters"/>
          </div>
        </div>
        <div class="form-group">
          <label>Monthly Budget (₹)</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 12h6M12 9v6"/></svg>
            <input type="number" id="signupBudget" placeholder="e.g. 50000"/>
          </div>
        </div>
        <div id="signupError" class="error-msg" style="display:none"></div>
        <button class="btn-submit" id="signupBtn">Create Account</button>
        <div class="auth-link">
          Already have an account? <a href="login.html">Sign In</a>
        </div>
      </div>
      <p class="auth-terms">By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    </div>
  </div>

  <script>
    document.getElementById('signupBtn').addEventListener('click', () => {
      const name   = document.getElementById('signupName').value.trim();
      const email  = document.getElementById('signupEmail').value.trim().toLowerCase();
      const pass   = document.getElementById('signupPassword').value;
      const budget = document.getElementById('signupBudget').value;
      const err    = document.getElementById('signupError');
      if (!name||!email||!pass||!budget) { err.textContent='Please fill all fields.'; err.style.display='block'; return; }
      if (pass.length < 6) { err.textContent='Password must be at least 6 characters.'; err.style.display='block'; return; }
      const users = JSON.parse(localStorage.getItem('fv_users')||'{}');
      if (users[email]) { err.textContent='Email already registered.'; err.style.display='block'; return; }
      users[email] = { name, email, password: pass, budget: parseInt(budget) };
      localStorage.setItem('fv_users', JSON.stringify(users));
      localStorage.setItem('fv_budget_'+email, budget);
      localStorage.setItem('fv_current_user', JSON.stringify(users[email]));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
